<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client CMS — Editor</title>
  <link rel="stylesheet" href="editor.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <h1>Client CMS</h1>
      <div class="topbar-right">
        <span id="userInfo"></span>
        <button id="logoutBtn" class="btn btn-secondary">Log out</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <section>
          <h2>Site</h2>
          <select id="siteSelect"></select>
          <div id="ownerSiteControls" class="owner-only" hidden>
            <details>
              <summary>New site</summary>
              <form id="newSiteForm" class="stack">
                <input id="newSiteName" placeholder="Site name" required />
                <button class="btn" type="submit">Create site</button>
              </form>
            </details>
            <details>
              <summary>Site settings</summary>
              <form id="siteSettingsForm" class="stack">
                <label>Site ID <input id="siteIdDisplay" readonly /></label>
                <label>Client password <input id="clientPasswordInput" type="password" placeholder="Set new password" /></label>
                <label>Vercel project name <input id="vercelProjectName" placeholder="my-project" /></label>
                <label>Vercel token <input id="vercelToken" type="password" placeholder="(optional, overrides server default)" /></label>
                <label>Vercel team ID <input id="vercelTeamId" placeholder="(optional)" /></label>
                <button class="btn" type="submit">Save settings</button>
              </form>
            </details>
          </div>
        </section>

        <section>
          <h2>Pages</h2>
          <ul id="pageList" class="list"></ul>
          <details>
            <summary>Add page from URL</summary>
            <form id="ingestForm" class="stack">
              <input id="ingestUrl" placeholder="https://example.com/page" required />
              <input id="ingestSlug" placeholder="slug (e.g. about, blank = home)" />
              <input id="ingestName" placeholder="Page name" />
              <button class="btn" type="submit">Ingest</button>
            </form>
            <div id="ingestStatus" class="status"></div>
          </details>
        </section>

        <section>
          <h2>Versions</h2>
          <ul id="versionList" class="list"></ul>
        </section>

        <section>
          <h2>Publish</h2>
          <button id="publishBtn" class="btn">Publish current content</button>
          <div id="publishStatus" class="status"></div>
          <ul id="publishList" class="list"></ul>
        </section>
      </aside>

      <main class="preview-area">
        <div class="preview-toolbar">
          <span id="pageTitle">No page selected</span>
          <button id="refreshPreviewBtn" class="btn btn-secondary">Refresh</button>
        </div>
        <iframe id="preview" title="Live preview"></iframe>
      </main>

      <aside id="editPanel" class="edit-panel" hidden>
        <h2>Edit slot</h2>
        <div id="editPanelBody"></div>
        <div class="status" id="editStatus"></div>
        <div class="row">
          <button id="saveSlotBtn" class="btn">Save change</button>
          <button id="cancelSlotBtn" class="btn btn-secondary">Cancel</button>
        </div>
      </aside>
    </div>

    <footer class="chat">
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form">
        <select id="aiProvider">
          <option value="anthropic">Anthropic</option>
          <option value="openrouter">OpenRouter</option>
        </select>
        <input id="aiApiKey" type="password" placeholder="API key (stored locally in browser)" />
        <input id="chatInput" placeholder="Describe a content change in plain English..." />
        <button class="btn" type="submit">Send</button>
      </form>
    </footer>
  </div>

  <script src="editor.js"></script>
</body>
</html>
