<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client CMS — Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 360px;
    }
    h1 { font-size: 1.25rem; margin: 0 0 1rem; }
    .tabs { display: flex; margin-bottom: 1rem; border-bottom: 1px solid #e2e2e2; }
    .tabs button {
      flex: 1; padding: 0.5rem; background: none; border: none; cursor: pointer;
      font-size: 0.9rem; color: #888; border-bottom: 2px solid transparent;
    }
    .tabs button.active { color: #111; border-bottom-color: #111; font-weight: 600; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; color: #444; }
    input {
      width: 100%; padding: 0.5rem; margin-bottom: 0.75rem;
      border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem;
    }
    button[type="submit"] {
      width: 100%; padding: 0.6rem; background: #111; color: #fff;
      border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer;
    }
    .error { color: #c0392b; font-size: 0.85rem; margin-bottom: 0.5rem; min-height: 1.1em; }
    .form { display: none; }
    .form.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Client CMS</h1>
    <div class="tabs">
      <button id="tabOwner" class="active">Owner</button>
      <button id="tabClient">Client</button>
    </div>
    <div class="error" id="error"></div>

    <form id="ownerForm" class="form active">
      <label for="masterKey">Master key</label>
      <input type="password" id="masterKey" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
    </form>

    <form id="clientForm" class="form">
      <label for="siteId">Site ID</label>
      <input type="text" id="siteId" required />
      <label for="clientPassword">Password</label>
      <input type="password" id="clientPassword" autocomplete="current-password" required />
      <button type="submit">Sign in</button>
    </form>
  </div>

  <script>
    const tabOwner = document.getElementById('tabOwner');
    const tabClient = document.getElementById('tabClient');
    const ownerForm = document.getElementById('ownerForm');
    const clientForm = document.getElementById('clientForm');
    const errorEl = document.getElementById('error');

    tabOwner.addEventListener('click', () => {
      tabOwner.classList.add('active');
      tabClient.classList.remove('active');
      ownerForm.classList.add('active');
      clientForm.classList.remove('active');
      errorEl.textContent = '';
    });
    tabClient.addEventListener('click', () => {
      tabClient.classList.add('active');
      tabOwner.classList.remove('active');
      clientForm.classList.add('active');
      ownerForm.classList.remove('active');
      errorEl.textContent = '';
    });

    async function login(body) {
      errorEl.textContent = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          errorEl.textContent = data.error || 'Login failed';
          return;
        }
        window.location.href = '/editor';
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }

    ownerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      login({ key: document.getElementById('masterKey').value });
    });

    clientForm.addEventListener('submit', (e) => {
      e.preventDefault();
      login({
        siteId: document.getElementById('siteId').value.trim(),
        password: document.getElementById('clientPassword').value,
      });
    });
  </script>
</body>
</html>
